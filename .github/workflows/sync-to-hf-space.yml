name: Sync backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/sync-to-hf-space.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend/ to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: Hannan-12
          HF_SPACE: devskill-backend
        run: |
          set -e
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          TMPDIR=$(mktemp -d)
          git clone "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}" "$TMPDIR/space"

          rsync -av --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='venv' \
            --exclude='ai_models/best_codebert_large' \
            --exclude='firebase_config' \
            backend/ "$TMPDIR/space/"

          cd "$TMPDIR/space"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push."
          else
            git commit -m "Sync from GitHub: ${GITHUB_SHA}"
            git push
          fi
